{% load static %}<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Stock Trader Pro{% endblock %}</title>
  <link rel="stylesheet" href="{% static 'css/app.css' %}">
  <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
</head>
<body>
  <nav class="navbar">
    <div class="nav-brand">
      <span class="nav-logo">📈</span>
      <span>Stock Trader Pro</span>
    </div>
    <div class="nav-links">
      <a href="{% url 'dashboard:index' %}">Home</a>

      <a href="{% url 'dashboard:analyze' %}?symbol=AAPL">Full Analysis</a>

  </nav>
  <main class="container">
    {% block content %}{% endblock %}

  <footer class="footer">
    <div>Stock Trader Pro · For educational purposes only · Not financial advice</div>
  </footer>
  {% block scripts %}{% endblock %}
